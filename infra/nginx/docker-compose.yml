services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${NGINX_PORT:-80}:80'
      - '${NGINX_SSL_PORT:-443}:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ${LOG_DIR:-../logs}/nginx:/var/log/nginx
    depends_on:
      web:
        condition: service_started
      api-server:
        condition: service_started
    networks: [coin-net]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test:
        ['CMD', 'wget', '-q', '--spider', '--no-check-certificate', 'https://localhost/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  coin-net:
    name: coin-net
