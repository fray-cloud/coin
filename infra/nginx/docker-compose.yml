services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_started
      api-server:
        condition: service_started
    networks: [coin-net]
    restart: unless-stopped

networks:
  coin-net:
    name: coin-net
