worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker 내장 DNS - upstream을 동적으로 resolve
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        # API requests - /api, /api/ 둘 다 매칭, prefix 제거
        location /api {
            rewrite ^/api(/.*)$ $1 break;
            rewrite ^/api$ / break;

            set $backend_api api-server:3000;
            proxy_pass http://$backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws {
            set $backend_api api-server:3000;
            proxy_pass http://$backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Next.js (default)
        location / {
            set $backend_web web:3001;
            proxy_pass http://$backend_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Next.js HMR WebSocket (dev only)
        location /_next/webpack-hmr {
            set $backend_web web:3001;
            proxy_pass http://$backend_web/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
