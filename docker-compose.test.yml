services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: coin_test
      POSTGRES_USER: coin_test
      POSTGRES_PASSWORD: coin_test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U coin_test']
      interval: 2s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 10
