name: Build & Push Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/coin

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api-server: ${{ steps.filter.outputs.api-server }}
      web: ${{ steps.filter.outputs.web }}
      worker-service: ${{ steps.filter.outputs.worker-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-server:
              - 'apps/api-server/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
            web:
              - 'apps/web/**'
              - 'packages/types/**'
              - 'packages/tsconfig/**'
              - 'pnpm-lock.yaml'
            worker-service:
              - 'apps/worker-service/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'

  build-api-server:
    needs: changes
    if: needs.changes.outputs.api-server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api-server/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api-server:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker-service:
    needs: changes
    if: needs.changes.outputs.worker-service == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker-service/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-worker-service:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-worker-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-complete:
    needs: [changes, build-api-server, build-web, build-worker-service]
    if: always() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - run: echo "All builds succeeded or were skipped"
