name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://coin:coin_dev@postgres:5432/coin
      E2E_BASE_URL: https://localhost
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build production images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          healthy=false
          for i in $(seq 1 60); do
            if curl -sk -o /dev/null -w "%{http_code}" https://localhost 2>/dev/null | grep -q "200\|301\|302\|307"; then
              echo "Services ready after ${i} attempts"
              healthy=true
              break
            fi
            echo "Attempt $i/60..."
            sleep 5
          done
          if [ "$healthy" != "true" ]; then
            echo "::error::Services failed to become healthy within 5 minutes"
            docker compose logs --tail=50
            exit 1
          fi

      - name: Run E2E tests
        run: pnpm --filter web test:e2e

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down
