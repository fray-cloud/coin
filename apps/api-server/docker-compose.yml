services:
  api-server:
    image: ghcr.io/fray-cloud/coin-api-server:latest
    build:
      context: ../..
      dockerfile: apps/api-server/Dockerfile
      target: production
    env_file:
      - ../../.env
    volumes:
      - ${LOG_DIR:-../../logs}/api-server:/app/logs
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [coin-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

networks:
  coin-net:
    name: coin-net
