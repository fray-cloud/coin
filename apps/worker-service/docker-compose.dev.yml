services:
  worker-service:
    build:
      context: ../..
      dockerfile: apps/worker-service/Dockerfile.dev
    env_file:
      - ../../.env.dev
    volumes:
      - ../../:/app
      - /app/node_modules
      - ${LOG_DIR:-../../logs}/worker-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [coin-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

networks:
  coin-net:
    name: coin-net
