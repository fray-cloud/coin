services:
  worker-service:
    build:
      context: ../..
      dockerfile: apps/worker-service/Dockerfile
      target: ${BUILD_TARGET:-production}
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [coin-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

networks:
  coin-net:
    name: coin-net
