services:
  worker-service:
    image: ghcr.io/fray-cloud/coin-worker-service:latest
    build:
      context: ../..
      dockerfile: apps/worker-service/Dockerfile
      target: production
    env_file:
      - ../../.env
    volumes:
      - ${LOG_DIR:-../../logs}/worker-service:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [coin-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

networks:
  coin-net:
    name: coin-net
