services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: ${BUILD_TARGET:-production}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-/ws}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN:-15m}
    expose:
      - '3001'
    networks: [coin-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  coin-net:
    name: coin-net
