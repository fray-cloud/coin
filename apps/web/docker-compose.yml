services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: ${BUILD_TARGET:-production}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-/ws}
    expose:
      - "3001"
    networks: [coin-net]
    restart: unless-stopped

networks:
  coin-net:
    name: coin-net
