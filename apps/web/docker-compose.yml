services:
  web:
    image: ghcr.io/fray-cloud/coin-web:latest
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: production
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-/ws}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN:-15m}
    expose:
      - '3001'
    networks: [coin-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  storybook:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: storybook
    ports:
      - '${STORYBOOK_PORT:-6006}:6006'
    networks: [coin-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    profiles: ['storybook']

networks:
  coin-net:
    name: coin-net
