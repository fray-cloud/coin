services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile.dev
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-/ws}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN:-15m}
    volumes:
      - ../../:/app
      - /app/node_modules
    expose:
      - '3001'
    networks: [coin-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  storybook:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile.dev
    volumes:
      - ../../:/app
      - /app/node_modules
    ports:
      - '${STORYBOOK_PORT:-6006}:6006'
    command: ['pnpm', 'storybook', '--no-open']
    networks: [coin-net]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    profiles: ['storybook']

networks:
  coin-net:
    name: coin-net
